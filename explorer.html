<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK-Mint | Global Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { autarky: '#00ffcc', autarkydark: '#00b38f', panel: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .currency-symbol { font-family: serif; font-weight: bold; color: #00ffcc; margin-right: 2px; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">
                    <span class="text-autarky">ATK</span>-Mint
                </h1>
                <p class="text-slate-400 mt-1 uppercase text-xs font-bold tracking-widest">Global Analytics Dashboard</p>
            </div>
            <div class="flex gap-4 md:gap-8 text-right bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl w-full md:w-auto justify-around md:justify-end">
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Network Status</p>
                    <p class="text-sm font-bold text-green-400 flex items-center justify-end gap-2 mt-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SECURE
                    </p>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Difficulty</p>
                    <p class="text-sm font-bold text-white mt-1" id="ui-difficulty">--</p>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Height</p>
                    <p class="text-sm font-bold text-autarky mt-1" id="ui-height">--</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-8">
                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700 border-l-4 border-l-autarky">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Supply in Circulation</h2>
                    <p class="text-3xl font-black text-white" id="ui-supply">
                        <span class="currency-symbol text-2xl">₳</span>--
                    </p>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        🏆 Ecosystem Leaderboard
                    </h2>
                    <div id="rich-list" class="space-y-3">
                        <p class="text-slate-500 italic text-xs">Syncing ledger records...</p>
                    </div>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Wallet Explorer</h2>
                    <div class="space-y-3">
                        <input type="text" id="wallet-address" placeholder="Enter Public Key..." 
                            class="w-full bg-slate-800 text-white px-4 py-3 rounded-lg border border-slate-600 focus:outline-none focus:border-autarky font-mono text-[10px]">
                        <button onclick="checkBalance()" class="w-full bg-autarky hover:bg-autarkydark text-slate-900 font-bold px-6 py-3 rounded-lg transition-all active:scale-95">
                            Verify Balance
                        </button>
                    </div>
                    <div id="balance-result-container" class="mt-4 p-4 bg-slate-800 rounded-lg hidden border border-slate-600">
                        <p class="text-[10px] text-slate-500 mb-1 font-bold">CONFIRMED LIQUIDITY</p>
                        <p id="balance-result" class="text-xl font-bold text-autarky"></p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 flex items-center justify-between">
                    Live Transaction Feed
                    <span class="text-[10px] font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 tracking-widest">REAL-TIME</span>
                </h2>
                <div id="block-feed" class="space-y-4">
                    <p class="text-slate-500 italic">Syncing with Cloud Vault...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://atk-mint-vault.duckdns.org';
        const TREASURY_ADDR = "302a300506032b6570032100166c1ef3780ee130bfc07e42ca4af7c56a319c656ce787a934928f0b62c4602d";

        function formatNumber(numStr) { 
            return new Intl.NumberFormat('en-US').format(numStr); 
        }

        function truncate(str, chars = 8) { 
            if (!str) return 'N/A';
            if (str.length <= chars * 2) return str;
            return str.substring(0, chars) + '...' + str.substring(str.length - chars); 
        }

        async function checkBalance() {
            const address = document.getElementById('wallet-address').value.trim();
            if (!address) return;
            try {
                const res = await fetch(`${SERVER_URL}/balance/${address}`);
                const data = await res.json();
                const bal = (data.balance === null || data.balance === undefined) ? "0" : data.balance.toString();
                document.getElementById('balance-result').innerHTML = `<span class="currency-symbol text-lg">₳</span>${formatNumber(bal)} ATK`;
                document.getElementById('balance-result-container').classList.remove('hidden');
            } catch (e) { console.error("Balance lookup failed."); }
        }

        function calculateAnalytics(blocks) {
            let balances = {};
            let totalSupply = BigInt(0);

            // Correct order is essential for balance calculation
            const sortedBlocks = [...blocks].sort((a, b) => a.height - b.height);

            sortedBlocks.forEach(block => {
                const address = (block.signer_pubkey || "").trim();
                if (!address) return;

                let amount = BigInt(0);

                // 1. GENESIS OVERRIDE (FORCE 100B)
                if (block.height === 0 || block.type === 'GENESIS') {
                    amount = BigInt("100000000000");
                } 
                // 2. MINT REWARDS
                else if (block.type === 'MINT') {
                    const match = block.vm_result ? String(block.vm_result).match(/Int\(([^)]+)\)/) : null;
                    amount = match ? BigInt(match) : BigInt(500);
                }

                balances[address] = (balances[address] || BigInt(0)) + amount;
                totalSupply += amount;

                // 3. TRANSFERS
                if (block.type === 'TRANSFER') {
                    const tAmount = BigInt(block.amount || 0);
                    const recipient = (block.recipient || "").trim();
                    balances[address] = (balances[address] || BigInt(0)) - tAmount;
                    balances[recipient] = (balances[recipient] || BigInt(0)) + tAmount;
                }
            });

            // Update Header Stats
            document.getElementById('ui-supply').innerHTML = `<span class="currency-symbol text-2xl">₳</span>${formatNumber(totalSupply.toString())} <span class="text-xs text-autarky font-bold">ATK</span>`;

            // Sort and Render the Rich List with Labels
            const richListHtml = Object.entries(balances)
                .filter(([addr, bal]) => bal > BigInt(0))
                .sort((a, b) => (b < a ? 1 : -1)) 
                .slice(0, 10)
                .map(([addr, bal], index) => {
                    const isCentralBank = addr === TREASURY_ADDR;
                    const label = isCentralBank 
                        ? `<span class="bg-autarky/20 text-autarky px-2 py-0.5 rounded text-[9px] font-bold border border-autarky/30 tracking-widest">🏦 CENTRAL BANK</span>` 
                        : `<span class="font-mono text-[10px] text-slate-400 font-bold">${truncate(addr, 10)}</span>`;

                    return `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700 hover:border-slate-500 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-600 font-bold text-[10px]">#${index + 1}</span>
                            <div class="flex flex-col">
                                ${label}
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-white text-sm"><span class="currency-symbol text-xs text-autarky">₳</span>${formatNumber(bal.toString())}</p>
                            <p class="text-[8px] text-slate-500 font-bold tracking-widest uppercase">LIQUID ATK</p>
                        </div>
                    </div>
                `}).join('');
            
            document.getElementById('rich-list').innerHTML = richListHtml || '<p class="text-sm text-slate-500">No active wallets.</p>';
        }

        async function fetchNetworkData() {
            try {
                const diffRes = await fetch(`${SERVER_URL}/difficulty`);
                const diffData = await diffRes.json();
                document.getElementById('ui-difficulty').innerText = diffData.difficulty || "6";

                const blockRes = await fetch(`${SERVER_URL}/blocks`);
                const rawData = await blockRes.json();
                
                let blocksArray = Array.isArray(rawData) ? rawData : (rawData.blocks || rawData.chain || []);
                if (blocksArray.length === 0) return;

                document.getElementById('ui-height').innerText = blocksArray.length - 1;
                calculateAnalytics(blocksArray);

                const feed = document.getElementById('block-feed');
                let feedHtml = '';
                const displayBlocks = [...blocksArray].reverse().slice(0, 25);

                displayBlocks.forEach(block => {
                    const isTransfer = block.type === 'TRANSFER';
                    const isGenesis = block.type === 'GENESIS' || block.height === 0;
                    const badgeColor = isTransfer ? 'bg-blue-500/20 text-blue-400 border-blue-500/30' : 
                                      (isGenesis ? 'bg-purple-500/20 text-purple-400 border-purple-500/30' : 
                                      'bg-emerald-500/20 text-emerald-400 border-emerald-500/30');
                    
                    const address = block.signer_pubkey || block.miner || "System";
                    let detailsHtml = '';
                    if (isTransfer) {
                        detailsHtml = `<p class="mt-3 text-right text-white font-bold"><span class="currency-symbol text-xs">₳</span>${formatNumber(block.amount.toString())} ATK Transferred</p>`;
                    } else if (isGenesis) {
                        detailsHtml = `<p class="mt-3 text-[10px] text-slate-400 italic font-mono uppercase tracking-tighter">Genesis Event: 100B ATK Injected into Central Bank</p>`;
                    } else {
                        detailsHtml = `<p class="mt-3 text-[10px] text-emerald-400 font-mono">Signer: ${truncate(address, 20)}</p>`;
                    }

                    feedHtml += `
                        <div class="bg-panel/80 p-5 rounded-xl border border-slate-700 shadow-sm hover:shadow-autarky/5 transition-all">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-lg font-bold">Block #${block.height}</h3>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded border uppercase tracking-widest ${badgeColor}">${block.type}</span>
                            </div>
                            <p class="text-[9px] text-slate-500 font-mono tracking-widest">${block.hash || "00000000..."}</p>
                            ${detailsHtml}
                        </div>
                    `;
                });
                feed.innerHTML = feedHtml;
            } catch (e) { console.error("Sync Error:", e); }
        }

        // Initialization
        fetchNetworkData();
        setInterval(fetchNetworkData, 5000);
    </script>
</body>
</html>
