<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK-Mint Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { autarky: '#00ffcc', autarkydark: '#00b38f', panel: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .currency-symbol { font-family: serif; font-weight: bold; color: #00ffcc; margin-right: 2px; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center border-b border-slate-700 pb-6 mb-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">
                    <span class="text-autarky">ATK</span>-Mint
                </h1>
                <p class="text-slate-400 mt-1">Live Global Analytics Dashboard</p>
            </div>
            <div class="flex gap-8 text-right bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Status</p>
                    <p class="text-lg font-bold text-green-400 flex items-center justify-end gap-2 mt-1">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span> Secured
                    </p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Difficulty</p>
                    <p class="text-lg font-bold text-white mt-1" id="ui-difficulty">--</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Height</p>
                    <p class="text-lg font-bold text-autarky mt-1" id="ui-height">--</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-8">
                
                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Circulating Supply</h2>
                    <p class="text-3xl font-extrabold text-white" id="ui-supply">
                        <span class="currency-symbol">₳</span>-- <span class="text-lg text-autarky">ATK</span>
                    </p>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        🏆 Top Holders (Rich List)
                    </h2>
                    <div id="rich-list" class="space-y-3">
                        <p class="text-slate-500 italic text-sm">Calculating wealth...</p>
                    </div>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Wallet Lookup</h2>
                    <div class="space-y-3">
                        <input type="text" id="wallet-address" placeholder="Enter Full Public Key..." 
                            class="w-full bg-slate-800 text-white px-4 py-3 rounded-lg border border-slate-600 focus:outline-none focus:border-autarky font-mono text-xs">
                        <button onclick="checkBalance()" class="w-full bg-autarky hover:bg-autarkydark text-slate-900 font-bold px-6 py-3 rounded-lg transition-colors">
                            Check Balance
                        </button>
                    </div>
                    <div id="balance-result-container" class="mt-4 p-4 bg-slate-800 rounded-lg hidden border border-slate-600">
                        <p class="text-xs text-slate-400 mb-1">CONFIRMED BALANCE</p>
                        <p id="balance-result" class="text-xl font-bold text-autarky"></p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    Live Block Feed
                    <span class="text-xs font-normal text-slate-400 bg-slate-800 px-2 py-1 rounded-md">Auto-updating</span>
                </h2>
                <div id="block-feed" class="space-y-4">
                    <p class="text-slate-500 italic">Syncing with secure network...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SERVER_URL = 'https://atk-mint-vault.duckdns.org';

        function formatTime(timestamp) { return new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}); }
        function formatNumber(num) { return new Intl.NumberFormat('en-US').format(num); }
        function truncate(str, chars = 8) { 
            if (!str) return 'N/A';
            if (str.length <= chars * 2) return str;
            return str.substring(0, chars) + '...' + str.substring(str.length - chars); 
        }

        async function checkBalance() {
            const address = document.getElementById('wallet-address').value.trim();
            if (!address) return;
            try {
                const res = await fetch(`${SERVER_URL}/balance/${address}`);
                const data = await res.json();
                const bal = isNaN(data.balance) ? 0 : data.balance; // Safe fallback
                document.getElementById('balance-result').innerHTML = `<span class="currency-symbol text-lg">₳</span>${formatNumber(bal)} ATK`;
                document.getElementById('balance-result-container').classList.remove('hidden');
            } catch (e) { alert("Could not reach the network."); }
        }

        function calculateAnalytics(blocks) {
            let balances = {};
            let totalSupply = 0;

            blocks.forEach(block => {
                const address = block.signer_pubkey || block.miner;

                if (block.type === 'GENESIS' || block.type === 'MINT') {
                    let amount = 500; // Default block reward
                    
                    // Attempt to parse amount safely
                    if (block.vm_result) {
                        const match = block.vm_result.match(/Int\((-?\d+)\)/);
                        if (match && !isNaN(Number(match))) amount = Number(match);
                    } else if (block.amount !== undefined && !isNaN(Number(block.amount))) {
                        amount = Number(block.amount);
                    }

                    balances[address] = (balances[address] || 0) + amount;
                    totalSupply += amount;
                }

                if (block.type === 'TRANSFER') {
                    const amount = Number(block.amount);
                    if (!isNaN(amount)) {
                        balances[block.signer_pubkey] = (balances[block.signer_pubkey] || 0) - amount;
                        balances[block.recipient] = (balances[block.recipient] || 0) + amount;
                    }
                }
            });

            document.getElementById('ui-supply').innerHTML = `<span class="currency-symbol">₳</span>${formatNumber(totalSupply)} <span class="text-lg text-autarky">ATK</span>`;

            const richListHtml = Object.entries(balances)
                .filter(([address, bal]) => bal > 0 && !isNaN(bal)) // Filter zeroes and NaNs
                .sort((a, b) => b - a)
                .slice(0, 5)
                .map(([address, bal], index) => `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-500 font-bold">#${index + 1}</span>
                            <span class="font-mono text-xs text-autarky" title="${address}">${truncate(address, 8)}</span>
                        </div>
                        <span class="font-bold text-white text-sm"><span class="currency-symbol text-xs">₳</span>${formatNumber(bal)} ATK</span>
                    </div>
                `).join('');
            
            document.getElementById('rich-list').innerHTML = richListHtml || '<p class="text-sm text-slate-500">No data.</p>';
        }

        async function fetchNetworkData() {
            try {
                const diffRes = await fetch(`${SERVER_URL}/difficulty`);
                document.getElementById('ui-difficulty').innerText = (await diffRes.json()).difficulty || "--";

                const blockRes = await fetch(`${SERVER_URL}/blocks`);
                const rawData = await blockRes.json();
                
                let blocksArray = [];
                if (Array.isArray(rawData)) blocksArray = rawData;
                else if (rawData && Array.isArray(rawData.chain)) blocksArray = rawData.chain;
                else if (rawData && Array.isArray(rawData.blocks)) blocksArray = rawData.blocks;
                else return;

                document.getElementById('ui-height').innerText = blocksArray.length > 0 ? blocksArray.length - 1 : 0;

                // THE FIX: Embed chronological height before reversing
                blocksArray.forEach((block, index) => {
                    block.trueHeight = index;
                });

                calculateAnalytics(blocksArray);

                const feed = document.getElementById('block-feed');
                let feedHtml = '';
                const displayBlocks = [...blocksArray].reverse().slice(0, 50);

                displayBlocks.forEach(block => {
                    const isTransfer = block.type === 'TRANSFER';
                    const isGenesis = block.type === 'GENESIS';
                    const badgeColor = isTransfer ? 'bg-blue-500/20 text-blue-400 border-blue-500/30' : 
                                      (isGenesis ? 'bg-purple-500/20 text-purple-400 border-purple-500/30' : 
                                      'bg-emerald-500/20 text-emerald-400 border-emerald-500/30');
                    
                    const address = block.signer_pubkey || block.miner;
                    let detailsHtml = '';

                    if (isTransfer) {
                        detailsHtml = `
                            <div class="flex justify-between items-center mt-3 bg-slate-900/50 p-3 rounded-lg">
                                <div><p class="text-
