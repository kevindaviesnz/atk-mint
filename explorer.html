<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK-Mint | Sovereign Ledger Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { autarky: '#00ffcc', autarkydark: '#00b38f', panel: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .currency-symbol { font-family: serif; font-weight: bold; color: #00ffcc; margin-right: 2px; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ffcc; }
        .animate-glow { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow {
            0%, 100% { border-color: rgba(0, 255, 204, 0.3); box-shadow: 0 0 5px rgba(0, 255, 204, 0.1); }
            50% { border-color: rgba(0, 255, 204, 0.8); box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">
                    <span class="text-autarky">ATK</span>-Mint
                </h1>
                <p class="text-slate-400 mt-1 uppercase text-xs font-bold tracking-widest italic">Sovereign Analytics Engine</p>
            </div>
            <div class="flex gap-4 md:gap-8 text-right bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl w-full md:w-auto justify-around md:justify-end">
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Protocol Status</p>
                    <p class="text-sm font-bold text-green-400 flex items-center justify-end gap-2 mt-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> SOVEREIGN
                    </p>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Difficulty</p>
                    <p class="text-sm font-bold text-white mt-1" id="ui-difficulty">--</p>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Height</p>
                    <p class="text-sm font-bold text-autarky mt-1" id="ui-height">--</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-8">
                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700 border-l-4 border-l-autarky">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Circulating Supply</h2>
                    <p class="text-3xl font-black text-white" id="ui-supply">
                        <span class="currency-symbol text-2xl">₳</span>--
                    </p>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        🏆 Top Sovereign Wallets
                    </h2>
                    <div id="rich-list" class="space-y-3">
                        <p class="text-slate-500 italic text-xs">Auditing ledger balances...</p>
                    </div>
                </div>

                <div class="bg-panel rounded-xl p-6 shadow-lg border border-slate-700">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Wallet Audit</h2>
                    <div class="space-y-3">
                        <input type="text" id="wallet-address" placeholder="Enter Public Key..." 
                            class="w-full bg-slate-800 text-white px-4 py-3 rounded-lg border border-slate-600 focus:outline-none focus:border-autarky font-mono text-[10px]">
                        <button onclick="checkBalance()" class="w-full bg-autarky hover:bg-autarkydark text-slate-900 font-bold px-6 py-3 rounded-lg transition-all active:scale-95">
                            Verify Liquid ₳
                        </button>
                    </div>
                    <div id="balance-result-container" class="mt-4 p-4 bg-slate-800 rounded-lg hidden border border-slate-600">
                        <p id="balance-result" class="text-xl font-bold text-autarky text-center"></p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 flex items-center justify-between">
                    Live Sovereign Block Feed
                    <span class="text-[10px] font-bold text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700 tracking-widest uppercase">Decentralized</span>
                </h2>
                <div id="block-feed" class="space-y-4">
                    <p class="text-slate-500 italic">Syncing with Racknerd Vault...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://atk-mint-vault.duckdns.org';
        const TREASURY_ADDR = "3056301006072a8648ce3d020106052b8104000a0342000431cf5a9df07b34fbabf6900251c7745c70ead9dfc9e81d7585f2f03553a110d72d6094f07e259734be5a3d069167765215147bf368e7deef63876f713620d293";

        function formatNumber(num) { 
            return new Intl.NumberFormat('en-US').format(num.toString()); 
        }

        function truncate(str, chars = 10) { 
            if (!str) return 'N/A';
            return str.length > (chars * 2) ? str.substring(0, chars) + '...' + str.substring(str.length - chars) : str; 
        }

        function toBigInt(val) {
            try {
                if (!val) return BigInt(0);
                const clean = String(val).replace(/[^0-9]/g, '');
                return BigInt(clean || 0);
            } catch (e) { return BigInt(0); }
        }

        function getMiningReward(height) {
            const INITIAL_REWARD = 50000;
            const HALVING_INTERVAL = 210000;
            const halvings = Math.floor(height / HALVING_INTERVAL);
            return BigInt(Math.floor(INITIAL_REWARD / Math.pow(2, halvings)));
        }

        async function checkBalance() {
            const address = document.getElementById('wallet-address').value.trim();
            if (!address) return;
            try {
                const res = await fetch(`${SERVER_URL}/balance/${address}`);
                const data = await res.json();
                document.getElementById('balance-result').innerHTML = `<span class="currency-symbol text-lg">₳</span>${formatNumber(data.balance)} ATK`;
                document.getElementById('balance-result-container').classList.remove('hidden');
            } catch (e) { console.error("Balance lookup failed."); }
        }

        async function fetchMempool() {
            try {
                const res = await fetch(`${SERVER_URL}/mempool`);
                const pending = await res.json();
                if (!pending || pending.length === 0) return '';

                return pending.map(tx => {
                    const isAsset = tx.message && tx.message.startsWith('ATK_ASSET|');
                    const assetName = isAsset ? tx.message.split('|') : 'Standard Transfer';
                    
                    return `
                        <div class="bg-slate-800/80 p-5 rounded-xl border-2 border-dashed border-autarky animate-glow mb-6">
                            <div class="flex justify-between items-center">
                                <h3 class="text-base font-bold text-autarky italic">⏳ Processing...</h3>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded border border-autarky text-autarky uppercase tracking-widest">MEMPOOL</span>
                            </div>
                            <p class="text-[10px] text-slate-400 font-mono mt-1 italic">Waiting for next block solve by network miners...</p>
                            <p class="mt-3 text-sm text-white font-bold border-l-4 border-autarky pl-3">
                                ${isAsset ? `📦 ASSET: ${assetName}` : `💸 TRANSFER: ${formatNumber(tx.amount)} ₳`}
                            </p>
                        </div>`;
                }).join('');
            } catch (e) { return ''; }
        }

        function calculateAnalytics(blocks) {
            let balances = {};
            let totalSupply = BigInt(0);

            // Replay the ledger history with correct mining rewards for all blocks
            blocks.sort((a, b) => a.height - b.height).forEach(block => {
                const signer = (block.signer_pubkey || "").trim();
                const recipient = (block.recipient || "").trim();
                if (!signer) return;

                if (block.type === 'GENESIS') {
                    const amt = BigInt("10000000000"); // 10B Genesis
                    balances[signer] = (balances[signer] || BigInt(0)) + amt;
                    totalSupply += amt;
                } 
                // --- FIXED: Reward is paid for EVERY block (MINT or TRANSFER) ---
                else {
                    const reward = getMiningReward(block.height);
                    
                    // Add reward to the Miner (signer)
                    balances[signer] = (balances[signer] || BigInt(0)) + reward;
                    totalSupply += reward;

                    // If it was a Transfer, handle the amount movement
                    if (block.type === 'TRANSFER') {
                        const amt = toBigInt(block.amount);
                        balances[signer] = (balances[signer] || BigInt(0)) - amt;
                        if (recipient) balances[recipient] = (balances[recipient] || BigInt(0)) + amt;
                    }
                }
            });

            // Update Global Supply UI
            document.getElementById('ui-supply').innerHTML = `<span class="currency-symbol text-2xl">₳</span>${formatNumber(totalSupply)} <span class="text-xs font-bold text-autarky">ATK</span>`;

            // Render Rich List
            const richListHtml = Object.entries(balances)
                .filter(([addr, bal]) => bal > BigInt(0))
                .sort((a, b) => (b < a ? -1 : 1)) 
                .slice(0, 10)
                .map(([addr, bal], index) => {
                    const isTreasury = addr === TREASURY_ADDR;
                    return `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                        <div class="flex flex-col">
                            <span class="text-slate-600 font-bold text-[9px]">#${index + 1}</span>
                            <span class="font-mono text-[9px] ${isTreasury ? 'text-autarky font-bold' : 'text-slate-400'}">${isTreasury ? '🏦 TREASURY' : truncate(addr, 6)}</span>
                        </div>
                        <p class="font-bold text-white text-sm"><span class="currency-symbol text-xs">₳</span>${formatNumber(bal)}</p>
                    </div>`;
                }).join('');
            
            document.getElementById('rich-list').innerHTML = richListHtml || '<p class="text-sm text-slate-500 text-center">Protocol initializing...</p>';
        }

        async function fetchNetworkData() {
            try {
                const [blockRes, mempoolHtml] = await Promise.all([
                    fetch(`${SERVER_URL}/blocks`),
                    fetchMempool()
                ]);
                
                const blocksArray = await blockRes.json();
                if (!blocksArray || !blocksArray.length) return;

                document.getElementById('ui-height').innerText = blocksArray.length - 1;
                const diffRes = await fetch(`${SERVER_URL}/difficulty`);
                const diffData = await diffRes.json();
                document.getElementById('ui-difficulty').innerText = diffData.difficulty || "6";

                calculateAnalytics(blocksArray);

                const feed = document.getElementById('block-feed');
                let feedHtml = mempoolHtml; 

                [...blocksArray].reverse().slice(0, 25).forEach(block => {
                    const isGenesis = block.type === 'GENESIS';
                    const isMint = block.type === 'MINT';
                    const badge = isGenesis ? 'border-purple-500 text-purple-400' : (isMint ? 'border-emerald-500 text-emerald-400' : 'border-blue-500 text-blue-400');
                    
                    feedHtml += `
                        <div class="bg-panel/80 p-5 rounded-xl border border-slate-700 shadow-sm transition-all hover:border-slate-500 mb-4">
                            <div class="flex justify-between items-center">
                                <h3 class="text-base font-bold text-white">Block #${block.height}</h3>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded border uppercase tracking-widest ${badge}">${block.type}</span>
                            </div>
                            <p class="text-[9px] text-slate-500 font-mono mt-1 break-all">${block.hash}</p>
                            ${block.message ? `<p class="mt-3 text-xs text-slate-400 italic border-l-2 border-slate-600 pl-3">"${block.message}"</p>` : ''}
                        </div>`;
                });
                feed.innerHTML = feedHtml;
            } catch (e) { 
                console.error("Sync Error:", e);
                document.getElementById('block-feed').innerHTML = `<p class="text-red-400 text-xs italic p-4 text-center">Connection to Vault lost. Reconnecting...</p>`;
            }
        }

        fetchNetworkData();
        setInterval(fetchNetworkData, 10000);
    </script>
</body>
</html>
